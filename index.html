<!DOCTYPE html>
<html lang="bn" class="scroll-smooth">
<head>
    <meta name="google-site-verification" content="15CTDcpQEtUOfzzYeD0XdfRpOXxoyuQmu74PrwZ5rkg" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q.hobby | ডিজিটাল মার্কেটিং এজেন্সি</title>
    
    <!-- === FAVICON === -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/9kkZ5m6g/2847.png">
    <link rel="shortcut icon" type="image/png" href="https://i.ibb.co/9kkZ5m6g/2847.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/9kkZ5m6g/2847.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'bangla': ['Hind Siliguri', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            purple: '#8b5cf6',
                            pink: '#ec4899',
                            cyan: '#06b6d4'
                        }
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
            padding-bottom: 80px; /* space for bottom nav */
        }
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .text-gradient {
            background: linear-gradient(to right, #06b6d4, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* App Layout Styles */
        .section { display: none; padding: 20px 15px; max-width: 1200px; margin: 0 auto; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            display: flex; justify-content: space-around; padding: 12px 0;
            z-index: 1000; border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #94a3b8; font-size: 0.8rem; cursor: pointer; transition: all 0.3s;
        }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }
        .nav-item.active { color: #06b6d4; }

        /* Floating WA */
        .floating-wa {
            position: fixed; bottom: 90px; right: 20px;
            background: #25D366; color: white; width: 55px; height: 55px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); z-index: 2000;
        }

        /* Cards for Home and Shop */
        .q-card {
            background: rgba(255, 255, 255, 0.05); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden; margin-bottom: 20px; transition: transform 0.2s;
        }
        .q-card:hover { transform: translateY(-3px); border-color: #8b5cf6; }
        .q-card-img { width: 100%; height: 200px; object-fit: cover; background: #1e293b; }
        
        .notification {
            position: fixed; top: 80px; right: 20px; background: #8b5cf6; color: white;
            padding: 15px 20px; border-radius: 8px; z-index: 4000;
            transform: translateX(400px); transition: transform 0.3s;
        }
        .notification.show { transform: translateX(0); }
    </style>
</head>
<body class="antialiased relative">

    <!-- Background Blobs -->
    <div class="fixed inset-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-0 -left-4 w-72 h-72 bg-brand-purple rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 bg-brand-cyan rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob" style="animation-delay: 2s"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-brand-pink rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob" style="animation-delay: 4s"></div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <!-- Top Navbar -->
    <nav class="fixed w-full z-50 glass transition-all duration-300 top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <img src="https://i.ibb.co/9kkZ5m6g/2847.png" alt="Logo" class="w-8 h-8 rounded-full">
                    <a href="#" class="text-2xl font-bold tracking-wider text-white">
                        Q.<span class="text-brand-cyan">hobby</span>
                    </a>
                </div>
                <!-- Admin 3 dots -->
                <div>
                    <button onclick="switchTab('admin')" class="text-gray-300 hover:text-white focus:outline-none p-2">
                        <i class="fas fa-ellipsis-v text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div style="height: 64px;"></div> <!-- Spacer -->

    <!-- Main Content -->
    <main>
        <!-- HOME SECTION (QhUb Photos/Videos) -->
        <section id="homeSection" class="section active">
            <div class="text-center mb-8">
                <h1 class="text-3xl md:text-5xl font-bold mb-4">স্বাগতম <span class="text-gradient">Q.hobby</span> তে</h1>
                <p class="text-gray-400">ডিজিটাল দুনিয়ায় আপনার বিশ্বস্ত পার্টনার ও লেটেস্ট আপডেট</p>
            </div>
            <div id="homeFeed" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Data from Supabase will load here -->
            </div>
        </section>

        <!-- SHOP SECTION -->
        <section id="shopSection" class="section">
            <h2 class="text-2xl font-bold text-white mb-6 border-l-4 border-brand-cyan pl-3">আমাদের প্রোডাক্টস (Shop)</h2>
            <div id="shopGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <!-- Products from Supabase -->
            </div>
        </section>

        <!-- SELL SECTION -->
        <section id="sellSection" class="section">
            <div class="glass p-6 md:p-8 rounded-2xl max-w-2xl mx-auto">
                <h2 class="text-2xl font-bold text-brand-pink mb-6 text-center">আপনার পণ্য বিক্রি করুন</h2>
                <form id="sellForm" onsubmit="submitSellForm(event)" class="space-y-4">
                    <div>
                        <label class="block text-gray-300 mb-2">পণ্যের নাম:</label>
                        <input type="text" id="sName" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-brand-cyan focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-300 mb-2">পণ্যের ছবি (এখানে সিলেক্ট করুন, হোয়াটসঅ্যাপে পাঠাতে হবে):</label>
                        <input type="file" id="sImg" accept="image/*" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-gray-400">
                    </div>
                    <div>
                        <label class="block text-gray-300 mb-2">মূল্য (৳):</label>
                        <input type="number" id="sPrice" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-brand-cyan focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-300 mb-2">আপনার নাম:</label>
                        <input type="text" id="sSeller" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-brand-cyan focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-300 mb-2">মোবাইল নম্বর:</label>
                        <input type="tel" id="sPhone" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-brand-cyan focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-300 mb-2">ঠিকানা:</label>
                        <textarea id="sAddress" required rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-brand-cyan focus:outline-none"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-brand-cyan to-brand-purple text-white font-bold text-lg py-4 rounded-xl mt-4">
                        Send to WhatsApp <i class="fab fa-whatsapp ml-2"></i>
                    </button>
                </form>
            </div>
        </section>

        <!-- ADMIN SECTION -->
        <section id="adminSection" class="section">
            <div id="adminLoginBox" class="glass p-8 rounded-2xl max-w-md mx-auto text-center">
                <h3 class="text-2xl font-bold mb-4 text-brand-cyan"><i class="fas fa-user-shield"></i> এডমিন প্যানেল</h3>
                <input type="password" id="adminPass" placeholder="পাসওয়ার্ড দিন" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white mb-4">
                <button onclick="verifyAdmin()" class="w-full bg-brand-purple py-3 rounded-xl font-bold">লগইন</button>
            </div>

            <div id="adminDashboard" style="display: none;" class="space-y-6 max-w-3xl mx-auto">
                <h2 class="text-2xl font-bold text-center text-white mb-6">এডমিন ড্যাশবোর্ড</h2>
                
                <!-- Add Home Feed (Culture) -->
                <div class="glass p-6 rounded-2xl border-t-4 border-brand-cyan">
                    <h4 class="text-lg font-bold mb-4">হোম পেজে পোস্ট যোগ করুন (QhUb)</h4>
                    <input type="text" id="cTitle" placeholder="টাইটেল" class="w-full bg-white/5 border border-white/10 p-3 rounded-lg mb-3 text-white">
                    <textarea id="cDesc" placeholder="বিস্তারিত..." class="w-full bg-white/5 border border-white/10 p-3 rounded-lg mb-3 text-white"></textarea>
                    <input type="file" id="cImg" accept="image/*,video/*" class="w-full mb-3 text-gray-400">
                    <button onclick="addHomeFeed(event)" class="bg-brand-cyan px-6 py-2 rounded-lg font-bold">আপলোড করুন</button>
                </div>

                <!-- Add Product (Shop) -->
                <div class="glass p-6 rounded-2xl border-t-4 border-brand-purple">
                    <h4 class="text-lg font-bold mb-4">শপ পেজে প্রোডাক্ট যোগ করুন</h4>
                    <input type="text" id="pName" placeholder="প্রোডাক্টের নাম" class="w-full bg-white/5 border border-white/10 p-3 rounded-lg mb-3 text-white">
                    <input type="number" id="pPrice" placeholder="মূল্য" class="w-full bg-white/5 border border-white/10 p-3 rounded-lg mb-3 text-white">
                    <input type="file" id="pImg" accept="image/*" class="w-full mb-3 text-gray-400">
                    <button onclick="addProduct(event)" class="bg-brand-purple px-6 py-2 rounded-lg font-bold">প্রোডাক্ট যোগ করুন</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-target="home" onclick="switchTab('home')">
            <i class="fas fa-home"></i><span>Home</span>
        </div>
        <div class="nav-item" data-target="shop" onclick="switchTab('shop')">
            <i class="fas fa-shopping-bag"></i><span>Shop</span>
        </div>
        <div class="nav-item" data-target="sell" onclick="switchTab('sell')">
            <i class="fas fa-store"></i><span>Sell</span>
        </div>
    </nav>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/8801920037889" class="floating-wa" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Logic Script -->
    <script>
        // Supabase Initialization (Updated to new project credentials)
        const supabaseUrl = 'https://wjpblozbopbvorpdzhuj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqcGJsb3pib3Bidm9ycGR6aHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTU3NTYsImV4cCI6MjA5NDA3MTc1Nn0.WAQv30acFVSvZiC4-HNEsrzPaDUa5zZYE4rEZF1dltc';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let products = [];
        let cultures = [];
        const ADMIN_PASS = "Shi567hab"; 

        // Notification Function
        function notify(msg) {
            const el = document.getElementById('notification');
            el.innerText = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        // Tab Switching
        function switchTab(tabId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            const targetSec = document.getElementById(tabId + 'Section');
            if(targetSec) targetSec.classList.add('active');
            
            const navItem = document.querySelector(`.nav-item[data-target="${tabId}"]`);
            if(navItem) navItem.classList.add('active');

            if(tabId === 'home' || tabId === 'shop') fetchData();
        }

        // Fetch Data from Supabase
        async function fetchData() {
            try {
                // Fetch Products
                let { data: prodData } = await supabaseClient.from('products').select('*').order('id', { ascending: false });
                if(prodData) products = prodData;
                
                // Fetch Home Feed (Culture)
                let { data: cultData } = await supabaseClient.from('culture').select('*').order('id', { ascending: false });
                if(cultData) cultures = cultData;

                renderUI();
            } catch(e) { console.error(e); }
        }

        function renderUI() {
            // Render Shop
            const shopGrid = document.getElementById('shopGrid');
            if(shopGrid) {
                shopGrid.innerHTML = products.map(p => `
                    <div class="q-card flex flex-col">
                        <img src="${p.image || 'https://via.placeholder.com/150'}" class="w-full h-32 md:h-48 object-cover bg-gray-800">
                        <div class="p-4 flex-1 flex flex-col">
                            <h3 class="font-bold text-white mb-2 text-sm md:text-base">${p.name}</h3>
                            <div class="text-brand-cyan font-bold mb-3 flex-1">৳${p.price}</div>
                            <a href="https://wa.me/8801920037889?text=Order:%20${encodeURIComponent(p.name)}" target="_blank" class="w-full text-center bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg text-sm font-bold transition">
                                <i class="fab fa-whatsapp"></i> Buy
                            </a>
                        </div>
                    </div>
                `).join('');
            }

            // Render Home Feed
            const homeFeed = document.getElementById('homeFeed');
            if(homeFeed) {
                homeFeed.innerHTML = cultures.map(c => `
                    <div class="glass rounded-xl overflow-hidden mb-4 p-5">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="w-10 h-10 rounded-full bg-brand-cyan/20 flex items-center justify-center text-brand-cyan"><i class="fas fa-newspaper"></i></div>
                            <div>
                                <h4 class="font-bold text-white">${c.title}</h4>
                                <span class="text-xs text-gray-400">QhUb Update</span>
                            </div>
                        </div>
                        <p class="text-gray-300 text-sm mb-4">${c.description}</p>
                        ${c.image ? `<img src="${c.image}" class="w-full rounded-lg object-contain bg-black max-h-80">` : ''}
                    </div>
                `).join('');
            }
        }

        // File to Base64
        const fileToBase64 = (file) => new Promise((resolve) => {
            if (!file) return resolve(null);
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => resolve(null);
        });

        // Submit Sell Form -> WhatsApp
        function submitSellForm(e) {
            e.preventDefault();
            const name = document.getElementById('sName').value;
            const price = document.getElementById('sPrice').value;
            const seller = document.getElementById('sSeller').value;
            const phone = document.getElementById('sPhone').value;
            const addr = document.getElementById('sAddress').value;

            const text = `*Sell Request:*\nProduct: ${name}\nPrice: ৳${price}\nSeller: ${seller}\nPhone: ${phone}\nAddress: ${addr}\n(Please attach the product image here)`;
            const url = `https://wa.me/8801920037889?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
            notify('WhatsApp-এ রিডাইরেক্ট করা হচ্ছে...');
            e.target.reset();
        }

        // Admin Verification
        function verifyAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === ADMIN_PASS) {
                document.getElementById('adminLoginBox').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                notify('লগইন সফল হয়েছে!');
            } else {
                notify('ভুল পাসওয়ার্ড!');
            }
        }

        // Admin Add Product
        async function addProduct(e) {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const imgFile = document.getElementById('pImg').files[0];
            
            if(!name || !price) return notify('নাম ও মূল্য দিন');
            const btn = e.target; btn.innerText = "অপেক্ষা করুন...";
            
            const imgData = await fileToBase64(imgFile);
            const newObj = { id: Date.now(), name, price: parseInt(price), image: imgData };
            
            try { 
                await supabaseClient.from('products').insert([newObj]); 
                notify('প্রোডাক্ট সফলভাবে যোগ হয়েছে!');
                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pImg').value = '';
                fetchData();
            } catch(err) { notify('এরর হয়েছে!'); }
            btn.innerText = "প্রোডাক্ট যোগ করুন";
        }

        // Admin Add Home Feed (QhUb post)
        async function addHomeFeed(e) {
            const title = document.getElementById('cTitle').value;
            const desc = document.getElementById('cDesc').value;
            const imgFile = document.getElementById('cImg').files[0];

            if(!title || !desc) return notify('টাইটেল ও বিস্তারিত দিন');
            const btn = e.target; btn.innerText = "অপেক্ষা করুন...";

            const imgData = await fileToBase64(imgFile);
            const newObj = { id: Date.now(), title, description: desc, image: imgData };

            try { 
                await supabaseClient.from('culture').insert([newObj]); 
                notify('পোস্ট সফলভাবে পাবলিশ হয়েছে!');
                document.getElementById('cTitle').value = '';
                document.getElementById('cDesc').value = '';
                document.getElementById('cImg').value = '';
                fetchData();
            } catch(err) { notify('এরর হয়েছে!'); }
            btn.innerText = "আপলোড করুন";
        }

        // Load Initial Data
        window.onload = () => {
            fetchData();
        };
    </script>
</body>
</html>
